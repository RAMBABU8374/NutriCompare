<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Admin Panel</title>

  <style>

    body{
      font-family: Arial;
      padding:20px;
      background:#f3f4f6;
    }

    input{
      display:block;
      margin:10px 0;
      padding:10px;
      width:300px;
    }

    button{
      padding:10px 20px;
      background:#2563eb;
      color:white;
      border:none;
      cursor:pointer;
    }

    .food{
      background:white;
      padding:15px;
      margin-top:15px;
      border-radius:10px;
    }

  </style>

</head>
<body>

<h1>NutriCompare Admin Panel</h1>

<h2>Add Food</h2>

<input type="text" id="name" placeholder="Food Name">
<input type="number" id="vitaminC" placeholder="Vitamin C">
<input type="number" id="antioxidants" placeholder="Antioxidants">
<input type="number" id="protein" placeholder="Protein">
<input type="number" id="fat" placeholder="Fat">
<input type="text" id="img" placeholder="Image URL">

<button onclick="addFood()">Add Food</button>

<hr>

<h2>All Foods</h2>

<div id="foodsContainer"></div>

<script src="crud.js"></script>

</body>
</html>
