<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title> NutriCompare</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(135deg, #f3f4f6, #e0e7ff);
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }
    nav {
      background: linear-gradient(90deg, #2563eb, #9333ea);
      color: white;
      padding: 18px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 1px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .container {
      max-width: 950px;
      margin: 30px auto;
      background: white;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      transition: transform 0.3s ease;
    }
    .container:hover {
      transform: translateY(-3px);
    }
    .foods {
      display: flex;
      justify-content: space-around;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 25px;
    }
    .food-box {
      text-align: center;
    }
    .food-box img {
      width: 130px;
      height: 130px;
      object-fit: cover;
      border-radius: 14px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.25);
      transition: transform 0.3s ease;
    }
    .food-box img:hover {
      transform: scale(1.08);
    }
    select {
      margin-top: 12px;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #aaa;
      outline: none;
      cursor: pointer;
      font-size: 15px;
    }
    button {
      margin-top: 20px;
      background: linear-gradient(90deg, #2563eb, #9333ea);
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
    }
    button:hover {
      background: linear-gradient(90deg, #9333ea, #2563eb);
      transform: scale(1.05);
    }
    .result {
      text-align: center;
      font-size: 19px;
      margin-top: 25px;
      font-weight: bold;
      color: #9333ea;
    }
  </style>
</head>
<body>
  <nav> 🍽️ NutriCompare  🍛</nav>

  <div class="container">
    <div class="foods">
      <div class="food-box">
        <img id="img1" src="https://static.vecteezy.com/system/resources/previews/035/833/474/non_2x/portrait-of-asian-girl-thinking-what-to-eat-choosing-between-cupcake-and-broccoli-vegetables-white-background-photo.jpg" alt="Food 1"/>
        <br>
        <select id="food1">
          <option value="">-- Select Food 1 --</option>
        </select>
      </div>
      <div class="food-box">
        <span style="font-size:22px;font-weight:bold;">VS</span>
      </div>
      <div class="food-box">
        <img id="img2" src="https://static.vecteezy.com/system/resources/previews/035/828/904/non_2x/portrait-of-asian-girl-thinking-what-to-eat-choosing-between-cupcake-and-broccoli-vegetables-white-background-photo.jpg" alt="Food 2"/>
        <br>
        <select id="food2">
          <option value="">-- Select Food 2 --</option>
        </select>
      </div>
    </div>

    <div style="text-align:center">
      <button onclick="updateChart()">Compare</button>
    </div>

    <canvas id="chart" height="200"></canvas>
    <div class="result" id="resultText"></div>
  </div>

  <script>
    let foods = {
      Orange: {vitaminC:80, antioxidants:70, protein:10, fat:5, img:"https://tse4.mm.bing.net/th/id/OIP._fpL6Wo5uc-yHoUrkQEB8gHaFj?pid=Api&h=220&P=0"},
      Almonds: {vitaminC:10, antioxidants:60, protein:70, fat:40, img:"https://tse2.mm.bing.net/th/id/OIP.S9Cqtt2_Vt3ocdmTyoIr-wHaEw?pid=Api&h=220&P=0"},
      Burger: {vitaminC:5, antioxidants:10, protein:30, fat:80, img:"https://tse3.mm.bing.net/th/id/OIP.Oj9ppaRfiy0FICs7w-pTtQHaHa?pid=Api&h=220&P=0"},
      Spinach: {vitaminC:60, antioxidants:80, protein:40, fat:10, img:"https://tse4.mm.bing.net/th/id/OIP.C_YfNbtMM86ry2u3tfihFwHaFj?pid=Api&h=220&P=0"},
      Apple: {vitaminC:40, antioxidants:50, protein:5, fat:2, img:"https://tse2.mm.bing.net/th?id=OIF.GxU%2fDM4i%2bRw0DYBrujBByA&pid=Api&h=220&P=0"},
      Carrot: {vitaminC:35, antioxidants:65, protein:10, fat:1, img:"https://tse3.mm.bing.net/th/id/OIP.tr38uLM7QBOLElGJHG88eQHaEi?pid=Api&h=220&P=0"},
      Pizza: {vitaminC:8, antioxidants:15, protein:25, fat:70, img:"https://tse3.mm.bing.net/th/id/OIP.8UeIFPMYwIErE1ShRYB9QAHaEo?pid=Api&h=220&P=0"},
      Broccoli: {vitaminC:70, antioxidants:85, protein:30, fat:5, img:"https://tse2.mm.bing.net/th/id/OIP.3k8082immh_-bfqWvkc7KgHaEm?pid=Api&h=220&P=0"},
      Chips: {vitaminC:2, antioxidants:5, protein:4, fat:85, img:"https://tse2.mm.bing.net/th/id/OIP.qkms5akLjvVAq-R2sv9hkgHaFj?pid=Api&h=220&P=0"},
      Banana: {vitaminC:25, antioxidants:40, protein:10, fat:2, img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQG7ElBNPs-HbYJJOMHRu7lEmphTn8-52FYKw&s"},
      Milk: {vitaminC:2, antioxidants:5, protein:60, fat:20, img:"https://cdn.britannica.com/77/200377-050-4326767F/milk-splashing-glass.jpg"},
      Fish: {vitaminC:5, antioxidants:15, protein:80, fat:30, img:"https://continentalfresh.in/cdn/shop/products/IMG-4902.jpg?v=1612248584"},
      Chicken: {vitaminC:2, antioxidants:10, protein:85, fat:25, img:"https://www.datocms-assets.com/129288/1734105343-homepage_header.png?auto=format&w=2400&h=1567&fit=crop"},
      Meat: {vitaminC:2, antioxidants:12, protein:90, fat:40, img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTiWAysLL2VkMYpSvzcYgFP5-6MxW1ur9z15g&s"},
      Prawns: {vitaminC:10, antioxidants:20, protein:80, fat:15, img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTiWAysLL2VkMYpSvzcYgFP5-6MxW1ur9z15g&s"},
      Egg: {vitaminC:1, antioxidants:5, protein:70, fat:30, img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQfiO7agvs5Xg3uKg-u0FIahDpYwib8Fj6giA&s"},
      Cheese: {vitaminC:2, antioxidants:8, protein:60, fat:70, img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTJ8-CCk_Xk2_JubFk84m1PbDg4efSQ83bfXg&s"},
      PeanutButter: {vitaminC:3, antioxidants:25, protein:75, fat:60, img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRP6tQv4YikqrVtWf6JjSLS5Q3Os-oBV9bFZg&s"},
      IceCream: {vitaminC:5, antioxidants:10, protein:20, fat:80, img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT532QISWGuf9bHX5Jv333T-bE5tAJTwx6ouQ&s"},
      Watermelon: {vitaminC:50, antioxidants:60, protein:5, fat:1, img:"https://upload.wikimedia.org/wikipedia/commons/thumb/c/cc/Watermelon_seedless.jpg/250px-Watermelon_seedless.jpg"},
      Grapes: {vitaminC:40, antioxidants:70, protein:5, fat:1, img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQczLLEOk49Pm-VqWD5euheDp8PbdF2FSoyYQ&s"},
      Mango: {vitaminC:60, antioxidants:55, protein:5, fat:2, img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ4fYh6jkcSKf2g3fxRoDBtHDOqbBwob9A1oQ&s"},
      Oats: {vitaminC:2, antioxidants:10, protein:50, fat:10, img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSbWiQ4mListxf41ajEPM7LLcJu4bLRxOUYQg&s"},
      Rice: {vitaminC:1, antioxidants:5, protein:30, fat:5, img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_a2EsuSBF1V-B3dr6I-t3pDzcsdIpVu_vGw&s"},
      Bread: {vitaminC:2, antioxidants:8, protein:40, fat:10, img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTgVuo_sYN__UzUkBoVI4C_21Fy8IOqEcPldA&s"}
    };

   async function populateFoods(){

  try{

    await loadFoodsFromDB();

  }catch(error){

    console.log("DB Load Failed");
  }

  Object.keys(foods).forEach(f => {

    const opt1 = document.createElement("option");
    opt1.value = f;
    opt1.text = f;

    const opt2 = document.createElement("option");
    opt2.value = f;
    opt2.text = f;

    food1.appendChild(opt1);
    food2.appendChild(opt2);
  });
}

populateFoods();

    // Chart.js setup
    let chart;
    function updateChart() {
      if (!food1.value || !food2.value) {
        alert("⚠️ Please select both foods first!");
        return;
      }
      img1.src = foods[food1.value].img;
      img2.src = foods[food2.value].img;

      const data = {
        labels: ["Vitamin C", "Antioxidants", "Protein", "Fat"],
        datasets: [
          {
            label: food1.value,
            data: [foods[food1.value].vitaminC, foods[food1.value].antioxidants, foods[food1.value].protein, foods[food1.value].fat],
            backgroundColor: "rgba(37, 99, 235, 0.7)",
            hoverBackgroundColor: "rgba(37, 99, 235, 1)"
          },
          {
            label: food2.value,
            data: [foods[food2.value].vitaminC, foods[food2.value].antioxidants, foods[food2.value].protein, foods[food2.value].fat],
            backgroundColor: "rgba(236, 72, 153, 0.7)",
            hoverBackgroundColor: "rgba(236, 72, 153, 1)"
          }
        ]
      };

      if (chart) chart.destroy();
      chart = new Chart(document.getElementById("chart"), {
        type: "bar",
        data: data,
        options: {
          responsive: true,
          plugins: {
            legend: { position: "top" },
            tooltip: { enabled: true }
          },
          scales: {
            y: { beginAtZero: true }
          }
        }
      });
      const score1 = foods[food1.value].vitaminC + foods[food1.value].antioxidants + foods[food1.value].protein - foods[food1.value].fat;
      const score2 = foods[food2.value].vitaminC + foods[food2.value].antioxidants + foods[food2.value].protein - foods[food2.value].fat;
      const best = score1 > score2 ? food1.value : food2.value;
      resultText.innerHTML = "✅ Best for health: <span style='color:#2563eb'>" + best + "</span>";
    }
  </script>
</body>
</html>
